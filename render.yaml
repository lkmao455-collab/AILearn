services:
  # 后端
  - type: web
    name: cv-learn-backend
    runtime: node
    region: oregon
    branch: master
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /api/health

  # 前端
  - type: web
    name: cv-learn-frontend
    runtime: static
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://ailearn-8p3f.onrender.com/api