services:
  # 全栈服务：后端 + 前端
  - type: web
    name: cv-learn
    runtime: node
    region: oregon
    branch: master
    rootDir: .
    buildCommand: |
      cd frontend && npm install && npm run build
      cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: /api
    healthCheckPath: /api/health