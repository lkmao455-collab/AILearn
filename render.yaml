# Render 部署配置 - 免费版
services:
  # 后端服务 - 使用 Node.js 运行时（免费）
  - type: web
    name: cv-learn-backend
    runtime: node
    region: singapore
    branch: master
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /api/health

  # 前端静态站点（免费）
  - type: web
    name: cv-learn-frontend
    runtime: static
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://cv-learn-backend.onrender.com
