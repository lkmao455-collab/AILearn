# Render 部署配置
# 此文件用于在 Render 上一键部署 CV Learn 全栈应用
# 确保使用 Node.js 运行时（非 Docker）

services:
  # PostgreSQL 数据库
  - type: pserv
    name: cv-learn-db
    runtime: postgres
    plan: free
    region: singapore
    ipAllowList: []

  # 后端服务 - 使用 Node.js 运行时
  - type: web
    name: cv-learn-backend
    runtime: node
    region: singapore
    plan: free
    branch: master
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cv-learn-db
          property: connectionString
      - key: DASHSCOPE_API_KEY
        sync: false
    healthCheckPath: /api/health

  # 前端静态站点
  - type: static
    name: cv-learn-frontend
    region: singapore
    plan: free
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: cv-learn-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
