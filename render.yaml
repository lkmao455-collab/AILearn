# Render 部署配置 - 使用 Docker
services:
  # 后端服务 - 使用 Docker
  - type: web
    name: cv-learn-backend
    runtime: docker
    region: singapore
    branch: master
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: PORT
        value: 3001
    healthCheckPath: /api/health

  # 前端静态站点
  - type: web
    name: cv-learn-frontend
    runtime: static
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://ailearn-8p3f.onrender.com
