# Render 部署配置 - 使用 Docker
services:
  # PostgreSQL 数据库
  - type: pserv
    name: cv-learn-db
    runtime: postgres
    plan: free
    region: singapore

  # 后端服务 - 使用 Docker
  - type: web
    name: cv-learn-backend
    runtime: docker
    region: singapore
    plan: free
    branch: master
    rootDir: .
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false  # 需要手动设置 PostgreSQL 连接字符串
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: PORT
        value: 3001
    healthCheckPath: /api/health
    dependsOn:
      - type: pserv
        name: cv-learn-db

  # 前端静态站点
  - type: static
    name: cv-learn-frontend
    region: singapore
    plan: free
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://ailearn-8p3f.onrender.com
