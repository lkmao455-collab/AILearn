services:
  # 后端服务 - 改为 Node 运行（不使用 Docker）
  - type: web
    name: cv-learn-backend
    runtime: node
    plan: free
    region: oregon   # 免费版推荐用 oregon
    branch: master
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js   # ⚠️ 改成你的入口文件
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: PORT
        value: 10000   # ⚠️ Render 推荐端口
    healthCheckPath: /api/health

  # 前端静态站点（免费版OK）
  - type: web
    name: cv-learn-frontend
    runtime: static
    plan: free
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://cv-learn-backend.onrender.com